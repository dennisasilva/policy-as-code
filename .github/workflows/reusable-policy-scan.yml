name: Reusable · Policy Scan

# Workflow REUTILIZÁVEL, chamado por outros repositórios no evento pull_request
# para validar o IaC ANTES do merge (gate preventivo). Consome as regras deste
# repositório central (checkov/ e guard-rules/).
#
# Uso no repo consumidor (.github/workflows/policy-gate.yml):
#   name: Policy Gate
#   on: pull_request
#   jobs:
#     policy:
#       uses: <ORG>/policy-as-code/.github/workflows/reusable-policy-scan.yml@main
#       with:
#         terraform_dir: "."
#         cloudformation_dir: "cfn"      # opcional; vazio = pula CloudFormation
#         policy_ref: "main"

on:
  workflow_call:
    inputs:
      terraform_dir:
        description: "Diretório com código Terraform a validar (vazio pula Checkov)."
        type: string
        default: "."
      cloudformation_dir:
        description: "Diretório com templates CloudFormation (vazio pula cfn-guard)."
        type: string
        default: ""
      policy_ref:
        description: "Ref (branch/tag) do repositório de políticas a usar."
        type: string
        default: "main"
      policy_repo:
        description: "owner/repo do repositório central de políticas."
        type: string
        default: "dennisasilva/policy-as-code"
      use_full_catalog:
        description: "Se true, aplica TODAS as regras do catálogo (catalog.txt) além das curadas (checks.txt). Padrão: só as curadas."
        type: boolean
        default: false
    secrets:
      policy_repo_token:
        description: "Token (PAT/GitHub App) com leitura no repo central. Necessário APENAS se ele for privado e estiver em outro repo/owner."
        required: false

jobs:
  policy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório consumidor
        uses: actions/checkout@v4

      - name: Checkout das políticas (repo central)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.policy_repo }}
          ref: ${{ inputs.policy_ref }}
          path: .policy-as-code
          # Se o repo central for privado em outro owner, o GITHUB_TOKEN padrao
          # nao tem acesso: passe um PAT/GitHub App em secrets.policy_repo_token.
          token: ${{ secrets.policy_repo_token || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        if: inputs.terraform_dir != ''
        run: pip install checkov

      - name: Checkov scan (inclusão/exclusão por diretório)
        if: inputs.terraform_dir != ''
        env:
          USE_FULL_CATALOG: ${{ inputs.use_full_catalog }}
        run: |
          set -euo pipefail
          POL=.policy-as-code/checkov

          # 1) INCLUDE: sempre as regras curadas (checks.txt de cada épico) —
          #    inclui built-in + custom (ex.: CKV2_PAC_1). Se use_full_catalog=true,
          #    soma também o catálogo completo (catalog.txt de cada épico).
          INCLUDE_FILES=$(find "$POL" -name checks.txt)
          if [ "${USE_FULL_CATALOG}" = "true" ]; then
            echo "Modo: CATÁLOGO COMPLETO (checks.txt + catalog.txt)"
            INCLUDE_FILES="$INCLUDE_FILES $(find "$POL" -name catalog.txt)"
          else
            echo "Modo: CURADO (apenas checks.txt)"
          fi

          strip() { grep -hvE '^[[:space:]]*#|^[[:space:]]*$' "$@" 2>/dev/null | sed 's/[[:space:]].*$//' | sort -u; }

          INCLUDE=$(strip $INCLUDE_FILES)

          # 2) EXCLUDE: remove os IDs listados em exclusions.txt.
          EXCLUDE=$(strip "$POL/exclusions.txt" || true)
          if [ -n "$EXCLUDE" ]; then
            ENFORCED=$(comm -23 <(printf '%s\n' "$INCLUDE") <(printf '%s\n' "$EXCLUDE"))
          else
            ENFORCED="$INCLUDE"
          fi

          CHECKS=$(printf '%s\n' "$ENFORCED" | grep -vE '^\s*$' | paste -sd, -)
          if [ -z "$CHECKS" ]; then
            echo "::error::Conjunto de checks vazio após include/exclude."
            exit 1
          fi

          # 3) SKIP-PATHS: monta --skip-path para cada padrão em skip-paths.txt.
          SKIP_ARGS=()
          while IFS= read -r p; do
            [ -n "$p" ] && SKIP_ARGS+=(--skip-path "$p")
          done < <(grep -vE '^[[:space:]]*#|^[[:space:]]*$' "$POL/skip-paths.txt" 2>/dev/null || true)

          echo "Checks aplicados: $(printf '%s\n' "$ENFORCED" | grep -cvE '^\s*$') | Excluídos: $(printf '%s\n' "$EXCLUDE" | grep -cvE '^\s*$' || echo 0) | Skip-paths: ${#SKIP_ARGS[@]}"
          printf '%s\n' "$ENFORCED" | sed 's/^/  - /'

          checkov -d "${{ inputs.terraform_dir }}" \
            --external-checks-dir "$POL" \
            --check "$CHECKS" \
            "${SKIP_ARGS[@]}" \
            --compact

      - name: Install cfn-guard
        if: inputs.cloudformation_dir != ''
        run: |
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/aws-cloudformation/cloudformation-guard/main/install-guard.sh | sh
          echo "$HOME/.guard/bin" >> "$GITHUB_PATH"

      - name: cfn-guard scan
        if: inputs.cloudformation_dir != ''
        run: |
          cfn-guard validate \
            -r .policy-as-code/guard-rules \
            -d "${{ inputs.cloudformation_dir }}" \
            --show-summary fail
